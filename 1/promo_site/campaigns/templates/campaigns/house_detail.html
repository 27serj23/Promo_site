<!-- Пагинация -->
{% if visits.has_other_pages %}
<nav>
    <ul class="pagination">
        {% if visits.has_previous %}
            <li class="page-item">
                <a class="page-link" href="?page=1">&laquo; Первая</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="?page={{ visits.previous_page_number }}">Назад</a>
            </li>
        {% endif %}

        <li class="page-item disabled">
            <span class="page-link">
                Страница {{ visits.number }} из {{ visits.paginator.num_pages }}
            </span>
        </li>

        {% if visits.has_next %}
            <li class="page-item">
                <a class="page-link" href="?page={{ visits.next_page_number }}">Вперёд</a>
            </li>
            <li class="page-item">
                <a class="page-link" href="?page={{ visits.paginator.num_pages }}">Последняя &raquo;</a>
            </li>
        {% endif %}
    </ul>
</nav>
{% endif %}
